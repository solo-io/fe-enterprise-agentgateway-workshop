# =============================================================================
# Figma OpenAPI -> MCP, protected by Auth0 (Layer A) + Figma OAuth via
# token-exchange elicitation (Layer B).
#
# Apply with envsubst so the ${...} placeholders are filled from your shell:
#   envsubst < figma-mcp.yaml | kubectl apply -f -
#
# Requires the eager-OAuth + Auth0 base from README.md Steps 2/4/5/6 to be in
# place first, and the figma-openapi-schema ConfigMap (created from
# figma-openapi.json — see README Step 6).
#
# Required env vars (see README Step 1):
#   AUTH0_DOMAIN AUTH0_ISSUER AUTH0_AUDIENCE AUTH0_GATEWAY_HOST
#   FIGMA_CLIENT_ID FIGMA_CLIENT_SECRET
# =============================================================================
---
# Static backend the controller uses to fetch Auth0's JWKS for JWT validation.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayBackend
metadata:
  name: auth0-jwks
  namespace: agentgateway-system
spec:
  static:
    host: ${AUTH0_DOMAIN}
    port: 443
  policies:
    tls: {}
---
# The Figma OpenAPI target, wrapped as an MCP backend.
#   - policies.mcp.authentication  -> Layer A: validate the inbound Auth0 JWT
#     and advertise the gateway's own eager-OAuth AS via issuer-proxy.
#   - the token-exchange elicitation (Layer B) is attached by a separate
#     EnterpriseAgentgatewayPolicy below.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayBackend
metadata:
  name: ent-figma-openapi-backend
  namespace: agentgateway-system
spec:
  policies:
    tls: {}
    mcp:
      authentication:
        mode: Strict
        issuer: ${AUTH0_ISSUER}
        audiences:
          - ${AUTH0_AUDIENCE}
        jwks:
          backendRef:
            group: enterpriseagentgateway.solo.io
            kind: EnterpriseAgentgatewayBackend
            name: auth0-jwks
          cacheDuration: 5m
          # NO leading slash: the controller joins the backend URL and this path
          # with a '/', so '/.well-known/...' would become '//.well-known/...'
          # which Auth0 returns 404 for (policy goes PartiallyValid, /mcp 406s).
          jwksPath: .well-known/jwks.json
        resourceMetadata:
          # Serve the gateway's OWN AS metadata (eager-OAuth issuer on :7777)
          # for .well-known/oauth-authorization-server/figma/openapi/mcp.
          agentgateway.dev/issuer-proxy: http://enterprise-agentgateway.agentgateway-system.svc.cluster.local:7777/oauth-issuer
          authorizationServers:
            - https://${AUTH0_GATEWAY_HOST}/figma/openapi/mcp
          resource: https://${AUTH0_GATEWAY_HOST}/figma/openapi/mcp
  entMcp:
    targets:
      - name: ent-figma-openapi
        static:
          host: api.figma.com
          port: 443
          protocol: OpenAPI
          openAPI:
            schemaRef:
              name: figma-openapi-schema
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: figma-openapi-mcp
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
      sectionName: https
  hostnames:
    - ${AUTH0_GATEWAY_HOST}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /figma/openapi/mcp
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource/figma/openapi/mcp
        - path:
            type: PathPrefix
            value: /.well-known/oauth-authorization-server/figma/openapi/mcp
      backendRefs:
        - group: enterpriseagentgateway.solo.io
          kind: EnterpriseAgentgatewayBackend
          name: ent-figma-openapi-backend
---
# CORS for browser-driven OAuth discovery (MCP Inspector etc.). Blanket '*'
# allowHeaders also covers the mcp-protocol-version preflight header.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: figma-openapi-policy
  namespace: agentgateway-system
spec:
  backend:
    tls: {}
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: figma-openapi-mcp
  traffic:
    cors:
      allowCredentials: false
      allowHeaders:
        - '*'
      allowMethods:
        - '*'
      allowOrigins:
        - '*'
---
# Layer B: elicit a per-user Figma OAuth token via the gateway's eager-OAuth
# issuer and inject it into calls to api.figma.com.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: ent-figma-openapi-exchange
  namespace: agentgateway-system
spec:
  backend:
    tokenExchange:
      elicitation:
        secretName: figma-token-exchange
  targetRefs:
    - group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayBackend
      name: ent-figma-openapi-backend
---
# Figma OAuth app credentials + endpoints for the elicitation flow.
# mcp_resource (instead of redirect_uri) routes the callback through the
# eager-OAuth issuer at /oauth-issuer/callback/upstream — which is the URL you
# must register in the Figma app's OAuth redirect settings.
apiVersion: v1
kind: Secret
metadata:
  name: figma-token-exchange
  namespace: agentgateway-system
type: Opaque
stringData:
  app_id: figma
  client_id: "${FIGMA_CLIENT_ID}"
  client_secret: "${FIGMA_CLIENT_SECRET}"
  authorize_url: "https://www.figma.com/oauth"
  access_token_url: "https://api.figma.com/v1/oauth/token"
  # Figma retired files:read for NEW OAuth apps; use the granular *_read scopes.
  # These must ALSO be enabled in the Figma app dashboard (OAuth scopes tab).
  scopes: "current_user:read file_content:read file_metadata:read file_comments:read file_versions:read"
  mcp_resource: "/figma/openapi/mcp"
