{{- range .Values.modelCatalog }}
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: llm-{{ .alias }}-auth
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "agentgateway-llm-ops.labels" $ | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: llm-{{ .alias }}
  traffic:
    apiKeyAuthentication:
      mode: Strict
      secretSelector:
        matchLabels:
          {{ include "agentgateway-llm-ops.aliasLabel" .alias }}: granted
{{- end }}
