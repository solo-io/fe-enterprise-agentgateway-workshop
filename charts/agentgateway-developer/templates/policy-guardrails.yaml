{{- range .Values.endpoints }}
{{- if .guardrails }}
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: {{ include "agentgateway-developer.team" $ }}-{{ .name }}-guardrails
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "agentgateway-developer.labels" $ | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "agentgateway-developer.team" $ }}-{{ .name }}
  backend:
    ai:
      promptGuard:
        {{- toYaml .guardrails.promptGuard | nindent 8 }}
{{- end }}
{{- end }}
