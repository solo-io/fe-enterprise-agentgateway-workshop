{{- range .Values.endpoints }}
{{- if eq .type "llm" }}
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayBackend
metadata:
  name: {{ include "agentgateway-developer.team" $ }}-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "agentgateway-developer.labels" $ | nindent 4 }}
spec:
  ai:
    {{- if .failover }}
    groups:
      - providers:
          - name: primary
            {{ .provider }}:
              {{- with .model }}
              model: {{ quote . }}
              {{- end }}
            {{- with .host }}
            host: {{ . }}
            {{- end }}
            {{- with .port }}
            port: {{ . }}
            {{- end }}
            {{- with .apiPath }}
            path: {{ quote . }}
            {{- end }}
      {{- range $i, $f := .failover }}
      - providers:
          - name: failover-{{ add $i 1 }}
            {{ $f.provider }}:
              {{- with $f.model }}
              model: {{ quote . }}
              {{- end }}
            {{- with $f.host }}
            host: {{ . }}
            {{- end }}
            {{- with $f.port }}
            port: {{ . }}
            {{- end }}
            {{- with $f.apiPath }}
            path: {{ quote . }}
            {{- end }}
      {{- end }}
    {{- else }}
    provider:
      {{ .provider }}:
        {{- with .model }}
        model: {{ quote . }}
        {{- end }}
      {{- with .host }}
      host: {{ . }}
      {{- end }}
      {{- with .port }}
      port: {{ . }}
      {{- end }}
      {{- with .apiPath }}
      path: {{ quote . }}
      {{- end }}
    {{- end }}
  {{- if not .failover }}
  policies:
    auth:
      {{- if .auth.passthrough }}
      passthrough: {}
      {{- else }}
      secretRef:
        name: {{ required (printf "endpoints[%s].auth.secretRef or auth.passthrough is required" .name) .auth.secretRef }}
      {{- end }}
  {{- end }}
{{- if .failover }}
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: {{ include "agentgateway-developer.team" $ }}-{{ .name }}-auth-primary
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "agentgateway-developer.labels" $ | nindent 4 }}
spec:
  targetRefs:
    - group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayBackend
      name: {{ include "agentgateway-developer.team" $ }}-{{ .name }}
      sectionName: primary
  backend:
    auth:
      {{- if .auth.passthrough }}
      passthrough: {}
      {{- else }}
      secretRef:
        name: {{ required (printf "endpoints[%s].auth.secretRef or auth.passthrough is required" .name) .auth.secretRef }}
      {{- end }}
{{- $outer := . }}
{{- range $i, $f := .failover }}
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: {{ include "agentgateway-developer.team" $ }}-{{ $outer.name }}-auth-failover-{{ add $i 1 }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "agentgateway-developer.labels" $ | nindent 4 }}
spec:
  targetRefs:
    - group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayBackend
      name: {{ include "agentgateway-developer.team" $ }}-{{ $outer.name }}
      sectionName: failover-{{ add $i 1 }}
  backend:
    auth:
      {{- if $f.passthrough }}
      passthrough: {}
      {{- else }}
      secretRef:
        name: {{ required (printf "endpoints[%s].failover[%d].secretRef or passthrough is required" $outer.name $i) $f.secretRef }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
